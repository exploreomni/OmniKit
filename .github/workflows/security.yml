name: Security checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        run: npm run security:audit

      - name: Run security regression tests
        run: npm run test:security

      - name: Run fan-out wizard tests
        run: npm run test:fanout

      - name: Run migration planner tests
        run: npm run test:migration-planner

      - name: Run instance dashboard tests
        run: npm run test:instance-dashboard

      - name: Typecheck app
        run: npm run typecheck

      - name: Typecheck local server
        run: npm run typecheck:node

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
