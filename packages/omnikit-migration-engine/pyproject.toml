[project]
name = "omnikit-migration-engine"
version = "0.1.0"
description = "Read-only source extraction and deterministic translation for OmniKit."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Omni" }]
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "lkml>=1.3",
    "httpx>=0.27",
    "pbixray>=0.13",
    "numpy>=1.26,<2.5",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.5", "jsonschema>=4.23,<5"]

[project.scripts]
omnikit-migration-engine = "omni_migrator.runtime:main"

[project.entry-points."omni_migrator.extractors"]
looker = "omni_migrator.extractors.looker.extractor:LookerExtractor"
tableau = "omni_migrator.extractors.tableau.extractor:TableauExtractor"
powerbi = "omni_migrator.extractors.powerbi.extractor:PowerBIExtractor"
metabase = "omni_migrator.extractors.metabase.extractor:MetabaseExtractor"
sigma = "omni_migrator.extractors.sigma.extractor:SigmaExtractor"

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/omni_migrator"]
artifacts = ["src/omni_migrator/rulebook/**/*.md"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
